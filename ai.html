<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>象棋麻將 vs AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: '標楷體', 'DFKai-SB', serif;
      background:
        radial-gradient(ellipse at 25% 15%, rgba(80,150,40,.4) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 85%, rgba(50,100,15,.4) 0%, transparent 55%),
        linear-gradient(160deg, #1a3a08 0%, #2d5a1b 45%, #173a08 100%);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px; color: white;
    }

    h1 {
      font-size: 2.2rem; margin-bottom: 16px; letter-spacing: 6px;
      background: linear-gradient(180deg, #fff8dc 0%, #ffd700 50%, #c8930a 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 2px 8px rgba(200,147,10,.7));
    }

    /* ── 資訊列 ── */
    .game-info {
      background: rgba(0,0,0,.4); border: 1px solid rgba(255,215,0,.18);
      border-radius: 12px; padding: 12px 24px;
      margin-bottom: 16px; width: 100%; max-width: 840px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.3);
    }
    #turn-info { font-size: 1.1rem; color: #ffd700; font-weight: bold; }
    #deck-count { color: #888; font-size: .88rem; margin-top: 4px; }
    #deck-count .num { color: #ffd700; font-size: 1.1rem; font-weight: bold; margin: 0 2px; }

    /* ── 按鈕 ── */
    .btn {
      background: linear-gradient(180deg, #ffe566 0%, #ffd700 55%, #c8930a 100%);
      color: #1a0a00; border: none; padding: 11px 28px;
      font-size: 1rem; border-radius: 10px; cursor: pointer; font-weight: bold;
      transition: all .18s; margin: 4px;
      box-shadow: 0 3px 8px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.4);
      font-family: inherit;
    }
    .btn:hover:not(:disabled) {
      background: linear-gradient(180deg, #fff099 0%, #ffe566 55%, #d4a010 100%);
      transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.4);
    }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { background: linear-gradient(180deg,#555,#444); color: #777; cursor: not-allowed; box-shadow: none; }
    .btn.secondary {
      background: linear-gradient(180deg, #5a9a5a 0%, #3d7a3d 100%);
      color: white; border: 1px solid rgba(255,255,255,.18);
    }
    .btn.secondary:hover:not(:disabled) { background: linear-gradient(180deg,#6aaa6a,#4d8a4d); }
    .btn.eat {
      background: linear-gradient(180deg, #ff8020 0%, #cc4400 100%);
      color: white; border: 1px solid rgba(255,255,255,.18);
    }
    .btn.eat:hover:not(:disabled) { background: linear-gradient(180deg,#ff9030,#dd5500); }

    /* ── 玩家面板 ── */
    .player-panel {
      background: rgba(0,0,0,.32); border: 2px solid transparent;
      border-radius: 12px; padding: 14px;
      transition: border-color .3s, background .3s, box-shadow .3s;
    }
    .player-panel.compact { flex: 1; min-width: 0; }
    .player-panel.active {
      border-color: #ffd700; background: rgba(255,215,0,.06);
      box-shadow: 0 0 22px rgba(255,215,0,.22);
      animation: active-border-pulse 1.5s ease-in-out infinite;
    }
    .player-panel.me-panel {
      border-color: #4ade80; width: 100%; max-width: 840px;
      padding: 18px 22px; margin-bottom: 16px;
      background: rgba(0,55,10,.28); box-shadow: 0 4px 20px rgba(0,0,0,.28);
    }
    .player-panel.me-panel.active {
      border-color: #ffd700; background: rgba(255,215,0,.08);
      box-shadow: 0 0 32px rgba(255,215,0,.28), 0 4px 20px rgba(0,0,0,.28);
      animation: active-border-pulse 1.5s ease-in-out infinite;
    }
    @keyframes active-border-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,215,0,.5); }
      50%     { box-shadow: 0 0 0 8px rgba(255,215,0,0); }
    }

    .player-name {
      font-size: .95rem; margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }

    /* ── 徽章 ── */
    .dealer-badge { background: linear-gradient(135deg,#ffd700,#c8930a); color: #1a0a00; font-size: .63rem; padding: 2px 7px; border-radius: 10px; font-weight: bold; }
    .me-badge     { background: linear-gradient(135deg,#4ade80,#1a7a3a); color: #fff;    font-size: .63rem; padding: 2px 7px; border-radius: 10px; font-weight: bold; }
    .ai-badge     { background: linear-gradient(135deg,#5577cc,#334499); color: white;   font-size: .63rem; padding: 2px 7px; border-radius: 10px; }
    .thinking-badge {
      background: linear-gradient(135deg,#cc7700,#995500); color: white;
      font-size: .63rem; padding: 2px 7px; border-radius: 10px;
      display: inline-flex; align-items: center; gap: 4px;
    }

    /* ── 跳動小點 ── */
    .dot-anim { display:inline-flex; gap:3px; vertical-align:middle; margin-left:4px; }
    .dot-anim span {
      display:inline-block; width:4px; height:4px; border-radius:50%;
      background:#ffd700; animation:dot-bounce 1.4s ease-in-out infinite;
    }
    .dot-anim span:nth-child(2) { animation-delay:.2s; }
    .dot-anim span:nth-child(3) { animation-delay:.4s; }
    @keyframes dot-bounce {
      0%,80%,100% { transform:translateY(0); opacity:.4; }
      40%         { transform:translateY(-4px); opacity:1; }
    }

    /* ── 棋子 ── */
    .hand { display: flex; flex-wrap: wrap; gap: 7px; }
    .hand.large { gap: 10px; }
    .piece {
      width: 50px; height: 50px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.15rem; font-weight: bold; border: none;
      transition: transform .18s, box-shadow .18s;
      user-select: none;
    }
    .piece.large { width: 80px; height: 80px; font-size: 2rem; border-radius: 16px; }
    .piece.small { width: 44px; height: 44px; font-size: 1rem; border-radius: 10px; }
    .piece.red {
      background: linear-gradient(160deg, #e83030 0%, #aa0000 55%, #800000 100%);
      color: #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,130,130,.5), inset 0 -2px 0 rgba(0,0,0,.3);
    }
    .piece.black {
      background: linear-gradient(160deg, #585858 0%, #2a2a2a 55%, #0e0e0e 100%);
      color: #e0e0e0;
      box-shadow: 0 4px 10px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.14), inset 0 -2px 0 rgba(0,0,0,.4);
    }
    .piece.hidden {
      background: linear-gradient(160deg, #7a5225 0%, #5c3d1a 55%, #3d2710 100%);
      color: transparent;
      box-shadow: 0 4px 10px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,200,100,.18), inset 0 -2px 0 rgba(0,0,0,.3);
    }
    .piece.selectable:hover {
      transform: translateY(-10px) scale(1.06);
      box-shadow: 0 14px 30px rgba(0,0,0,.7), 0 0 0 2px #ffd700;
      cursor: pointer; z-index: 1;
    }
    .piece.drawn  { animation: pop .4s ease-out; box-shadow: 0 0 0 3px #ffd700, 0 6px 20px rgba(255,215,0,.5) !important; }
    .piece.eatable{ animation: glow-piece 1s ease-in-out infinite alternate; }
    .piece.latest { box-shadow: 0 0 0 2px #ffd700, 0 0 12px rgba(255,215,0,.5) !important; }

    @keyframes pop {
      0%   { transform: scale(.5) translateY(-20px); opacity: .3; }
      65%  { transform: scale(1.12) translateY(0); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes glow-piece {
      from { box-shadow: 0 0 8px #ffd700, inset 0 1px 0 rgba(255,255,255,.3); }
      to   { box-shadow: 0 0 26px #ffd700, 0 0 44px rgba(255,215,0,.5), inset 0 1px 0 rgba(255,255,255,.3); }
    }

    /* ── 操作區 ── */
    .controls {
      background: rgba(0,0,0,.35); border: 1px solid rgba(255,255,255,.07);
      border-radius: 12px; padding: 14px 24px; margin-bottom: 16px;
      text-align: center; width: 100%; max-width: 840px;
    }
    .status-msg { font-size: 1rem; margin-top: 8px; min-height: 1.4rem; color: #ffd700; font-weight: bold; }
    .eat-controls { margin-top: 10px; display: flex; gap: 8px; justify-content: center; }

    /* ── 胡牌橫幅 ── */
    .win-overlay { display: none; width: 100%; max-width: 840px; margin-bottom: 16px; }
    .win-overlay.show { display: block; animation: win-slide-in .4s cubic-bezier(.175,.885,.32,1.275); }
    @keyframes win-slide-in {
      from { transform: scale(.88) translateY(-8px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }
    .win-box {
      background: linear-gradient(160deg, #2a0800 0%, #4a1600 45%, #2a0800 100%);
      border: 2px solid #ffd700; border-radius: 16px;
      padding: 22px 32px; text-align: center;
      position: relative; overflow: hidden;
      box-shadow: 0 0 40px rgba(255,215,0,.22), 0 8px 30px rgba(0,0,0,.55);
    }
    .win-box::before {
      content:''; position:absolute; inset:0;
      background: radial-gradient(ellipse at 50% 0%, rgba(255,215,0,.12) 0%, transparent 65%);
      pointer-events: none;
    }
    .win-crown { font-size: 2.2rem; display: block; margin-bottom: 4px; animation: crown-bounce .8s ease-out; }
    @keyframes crown-bounce {
      0%   { transform:translateY(-20px) scale(.5); opacity:0; }
      65%  { transform:translateY(5px) scale(1.1); }
      100% { transform:translateY(0) scale(1); opacity:1; }
    }
    .win-title {
      font-size: 1.6rem; margin-bottom: 8px;
      background: linear-gradient(180deg,#fff8dc,#ffd700,#c8930a);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      animation: gold-shimmer 2s ease-in-out infinite alternate;
    }
    @keyframes gold-shimmer {
      from { filter: drop-shadow(0 2px 4px rgba(200,147,10,.5)); }
      to   { filter: drop-shadow(0 2px 14px rgba(255,215,0,.9)); }
    }
    .win-pattern {
      font-size: .95rem; color: #ddd;
      background: rgba(0,0,0,.3); border-radius: 8px;
      padding: 6px 14px; margin-bottom: 14px; display: inline-block;
      border: 1px solid rgba(255,215,0,.2);
    }
    .confetti-piece {
      position: absolute; border-radius: 2px;
      animation: confetti-fall linear forwards; pointer-events: none;
    }
    @keyframes confetti-fall {
      0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(200px) rotate(720deg); opacity: 0; }
    }

    /* ── 棄牌區 ── */
    .discard-area {
      background: rgba(0,0,0,.35); border: 1px solid rgba(255,255,255,.07);
      border-radius: 12px; padding: 16px 18px;
      margin-bottom: 16px; width: 100%; max-width: 840px;
    }
    .discard-area > h3 {
      font-size: .85rem; color: #777; margin-bottom: 14px; letter-spacing: 2px;
      display: flex; align-items: center; gap: 10px;
    }
    .discard-area > h3::before,
    .discard-area > h3::after { content:''; flex:1; height:1px; background:rgba(255,255,255,.1); }
    .discard-rows { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .discard-row  {
      background: rgba(0,0,0,.2); border-radius: 10px;
      padding: 10px 12px; display: flex; flex-direction: column; gap: 8px;
    }
    .discard-label {
      font-size: .8rem; font-weight: bold; padding: 3px 10px;
      border-radius: 6px; display: inline-block; align-self: flex-start;
    }
    .discard-label-0 { background: rgba(255,215,0,.18);  color: #ffd700; border: 1px solid rgba(255,215,0,.28); }
    .discard-label-1 { background: rgba(74,222,128,.14); color: #4ade80; border: 1px solid rgba(74,222,128,.24); }
    .discard-label-2 { background: rgba(244,114,182,.14);color: #f472b6; border: 1px solid rgba(244,114,182,.24); }
    .discard-label-3 { background: rgba(56,189,248,.14); color: #38bdf8; border: 1px solid rgba(56,189,248,.24); }
    .discard-pieces { display: flex; flex-wrap: wrap; gap: 5px; }

    /* ── 切換按鈕 ── */
    .toggle-others {
      background: rgba(0,0,0,.3); border: 1px solid rgba(255,215,0,.2);
      color: #aaa; border-radius: 8px; padding: 6px 18px;
      font-size: .82rem; cursor: pointer; width: 100%; max-width: 840px;
      text-align: center; margin-bottom: 8px;
      transition: color .2s, border-color .2s, background .2s; font-family: inherit;
    }
    .toggle-others:hover { color: #ffd700; border-color: rgba(255,215,0,.5); background: rgba(255,215,0,.05); }

    /* ── 其他玩家列 ── */
    .others-row {
      display: flex; gap: 8px;
      width: 100%; max-width: 840px; margin-bottom: 16px;
    }

    /* ── 紀錄 ── */
    .log {
      background: rgba(0,0,0,.45); border: 1px solid rgba(255,255,255,.06);
      border-radius: 10px; padding: 10px 14px;
      max-height: 130px; overflow-y: auto; width: 100%; max-width: 840px;
      font-size: .82rem; color: #999;
      scrollbar-width: thin; scrollbar-color: rgba(255,215,0,.25) transparent;
    }
    .log::-webkit-scrollbar { width: 4px; }
    .log::-webkit-scrollbar-thumb { background: rgba(255,215,0,.25); border-radius: 2px; }
    .log p { margin: 2px 0; line-height: 1.5; border-bottom: 1px solid rgba(255,255,255,.04); padding-bottom: 2px; }
    .log p:last-child { border-bottom: none; }

    /* ── 積分 ── */
    .score-badge { font-size:.72rem; color:#ffd700; background:rgba(255,215,0,.12); border:1px solid rgba(255,215,0,.22); border-radius:5px; padding:1px 6px; font-weight:bold; }
    .score-badge.neg { color:#f87171; background:rgba(248,113,113,.1); border-color:rgba(248,113,113,.22); }
    .win-type-badge { font-size:.82rem; color:#ffd700; letter-spacing:1px; background:rgba(255,215,0,.1); border:1px solid rgba(255,215,0,.22); border-radius:8px; padding:3px 12px; margin-bottom:12px; display:inline-block; }
    .score-changes { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:14px; }
    .score-item { background:rgba(0,0,0,.3); border-radius:8px; padding:7px 14px; display:flex; flex-direction:column; align-items:center; gap:2px; min-width:72px; border:1px solid rgba(255,255,255,.08); }
    .score-item.positive { border-color:rgba(74,222,128,.35); background:rgba(74,222,128,.09); }
    .score-item.negative { border-color:rgba(248,113,113,.35); background:rgba(248,113,113,.09); }
    .score-name { font-size:.75rem; color:#aaa; white-space:nowrap; }
    .score-delta { font-size:1.25rem; font-weight:bold; }
    .score-item.positive .score-delta { color:#4ade80; }
    .score-item.negative .score-delta { color:#f87171; }
    .score-item.neutral  .score-delta { color:#888; }
    .score-total { font-size:.8rem; color:#ffd700; }

    /* ── 手機版 ── */
    @media (max-width: 600px) {
      body { padding: 10px; }
      h1 { font-size: 1.5rem; letter-spacing: 3px; }
      .piece.large { width: 62px; height: 62px; font-size: 1.55rem; border-radius: 12px; }
      .piece, .piece.small { width: 38px; height: 38px; font-size: .88rem; border-radius: 8px; }
      .hand.large { gap: 6px; }
      .hand { gap: 5px; }
      .controls, .discard-area { padding: 10px 12px; }
      .discard-rows { grid-template-columns: 1fr; }
      .btn { padding: 9px 16px; font-size: .88rem; }
      .player-panel.me-panel { padding: 12px; }
      .win-box { padding: 16px 20px; }
      .win-title { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <h1>◈ 象棋麻將 vs AI ◈</h1>

  <div class="game-info">
    <div id="turn-info">點擊「新遊戲」開始</div>
    <div id="deck-count">牌堆：<span class="num">32</span> 張</div>
    <div style="margin-top:10px">
      <button class="btn secondary" onclick="newGame()">新遊戲</button>
      <button class="btn secondary" id="reveal-btn" onclick="toggleReveal()">👁 顯示AI手牌</button>
      <button class="btn secondary" onclick="resetScores()" style="font-size:.82rem;padding:8px 16px">重置積分</button>
    </div>
  </div>

  <!-- 自己的手牌 -->
  <div id="my-area"></div>

  <!-- 操作按鈕 -->
  <div class="controls">
    <button class="btn" id="draw-btn" disabled onclick="drawPiece()">摸牌</button>
    <button class="btn eat" id="eat-btn" style="display:none" onclick="eatPiece()">吃牌</button>
    <div class="status-msg" id="status-msg"></div>
  </div>

  <!-- 胡牌橫幅 -->
  <div class="win-overlay" id="win-overlay">
    <div class="win-box">
      <span class="win-crown" id="win-crown">👑</span>
      <h2 class="win-title" id="win-title">胡牌！</h2>
      <p class="win-pattern" id="win-msg"></p>
      <div class="win-type-badge" id="win-type-badge"></div>
      <div class="score-changes" id="win-score-summary"></div>
      <button class="btn" onclick="newGame()">再來一局</button>
    </div>
  </div>

  <!-- 棄牌區 -->
  <div class="discard-area">
    <h3>棄牌區</h3>
    <div class="discard-rows" id="discard-rows"></div>
  </div>

  <!-- AI 玩家（可折疊） -->
  <button class="toggle-others" id="toggle-others-btn" onclick="toggleOthers()">▼ 顯示 AI 玩家手牌</button>
  <div class="others-row" id="others-area" style="display:none"></div>

  <!-- 紀錄 -->
  <div class="log" id="log"></div>

  <script>
    // ── 牌堆 ──────────────────────────────────────────────
    function createDeck() {
      const pieces = []; let id = 0;
      const redTypes   = [['帥',1],['仕',2],['相',2],['車',2],['馬',2],['炮',2],['兵',5]];
      const blackTypes = [['將',1],['士',2],['象',2],['車',2],['馬',2],['包',2],['卒',5]];
      for (const [type,n] of redTypes)   for (let i=0;i<n;i++) pieces.push({id:id++,type,color:'red'});
      for (const [type,n] of blackTypes) for (let i=0;i<n;i++) pieces.push({id:id++,type,color:'black'});
      return pieces;
    }

    function shuffle(arr) {
      for (let i=arr.length-1;i>0;i--) {
        const j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
      }
      return arr;
    }

    function pieceChar(p) {
      if (p.color === 'red') {
        if (p.type === '馬') return '傌';
        if (p.type === '車') return '俥';
      }
      return p.type;
    }

    // ── 胡牌判斷 ──────────────────────────────────────────
    function combos(arr, k) {
      if (k===0) return [[]];
      if (arr.length<k) return [];
      const [h,...t]=arr;
      return [...combos(t,k-1).map(c=>[h,...c]),...combos(t,k)];
    }

    const TYPE_ORDER  = {'帥':0,'將':0,'仕':1,'士':1,'相':2,'象':2,'車':3,'馬':4,'炮':5,'包':5,'兵':6,'卒':6};
    const COLOR_ORDER = {red:0,black:1};
    function sortHand(hand) {
      hand.sort((a,b) => COLOR_ORDER[a.color]-COLOR_ORDER[b.color] || (TYPE_ORDER[a.type]??9)-(TYPE_ORDER[b.type]??9));
    }

    function pairKey(type) { return type==='帥' ? '將' : type; }
    function isPair(two) {
      if (two.length !== 2) return false;
      const [a, b] = two;
      if (pairKey(a.type) === '將' && pairKey(b.type) === '將') return true; // 帥+將 例外
      return a.color === b.color && a.type === b.type;
    }

    function checkWin(hand) {
      if (hand.length !== 5) return {win:false};
      const trios = [
        {color:'red',   types:['帥','仕','相'], label:'紅帥+仕+相'},
        {color:'black', types:['將','士','象'], label:'黑將+士+象'},
        {color:'red',   types:['車','馬','炮'], label:'紅車+馬+炮'},
        {color:'black', types:['車','馬','包'], label:'黑車+馬+包'},
      ];
      for (const {color,types,label} of trios) {
        const trio = types.map(t => hand.find(p => p.type===t && p.color===color));
        if (trio.some(p=>!p)) continue;
        const ids  = new Set(trio.map(p=>p.id));
        const rest = hand.filter(p=>!ids.has(p.id));
        if (isPair(rest)) return {win:true, pattern:`${label} + 對子（${rest[0].type}）`};
      }
      for (const [type,color,label] of [['卒','black','黑卒'],['兵','red','紅兵']]) {
        const pawns = hand.filter(p=>p.type===type && p.color===color);
        if (pawns.length===5) return {win:true, pattern:`五${label}`};
        if (pawns.length>=3) {
          for (const trio of combos(pawns,3)) {
            const ids  = new Set(trio.map(p=>p.id));
            const rest = hand.filter(p=>!ids.has(p.id));
            if (isPair(rest)) return {win:true, pattern:`三${label} + 對子（${rest[0].type}）`};
          }
        }
      }
      return {win:false};
    }

    // ── AI 邏輯 ──────────────────────────────────────────
    const ALL_PIECE_TYPES = [
      ['帥','red'],['仕','red'],['相','red'],['車','red'],['馬','red'],['炮','red'],['兵','red'],
      ['將','black'],['士','black'],['象','black'],['車','black'],['馬','black'],['包','black'],['卒','black']
    ];

    function countPotentialWins(hand4) {
      let count = 0; let tempId = 10000;
      for (const [type,color] of ALL_PIECE_TYPES) {
        if (checkWin([...hand4, {id:tempId++,type,color}]).win) count++;
      }
      return count;
    }

    function aiChooseDiscard(hand5) {
      let bestScore = -1, bestDiscard = hand5[0];
      for (const piece of hand5) {
        const score = countPotentialWins(hand5.filter(p => p.id !== piece.id));
        if (score > bestScore) { bestScore = score; bestDiscard = piece; }
      }
      return bestDiscard;
    }

    function aiShouldEat(hand4, eatPc) {
      const afterEat = [...hand4, eatPc];
      if (checkWin(afterEat).win) return true;
      let bestAfterEat = 0;
      for (const p of afterEat) {
        bestAfterEat = Math.max(bestAfterEat, countPotentialWins(afterEat.filter(x => x.id !== p.id)));
      }
      return bestAfterEat > countPotentialWins(hand4);
    }

    // ── 計分 ──────────────────────────────────────────────
    let scores = [0, 0, 0, 0];

    function getWinTai(pattern, isZiMo) {
      return pattern.startsWith('五') ? (isZiMo ? 10 : 6) : (isZiMo ? 2 : 1);
    }

    function scoreBadge(i) {
      const sc = scores[i];
      return `<span class="score-badge${sc < 0 ? ' neg' : ''}">${sc >= 0 ? '+' : ''}${sc}</span>`;
    }

    function resetScores() {
      scores = [0, 0, 0, 0];
      render();
    }

    let aiThinking = false;

    function scheduleAITurn() {
      if (aiThinking) return;
      const player = state.players[state.currentPlayer];
      if (!player || !player.isAI) return;
      if (!['draw','discard','can-eat'].includes(state.phase)) return;
      aiThinking = true;
      const delay = state.phase==='draw' ? 700 : state.phase==='discard' ? 1100 : 800;
      setTimeout(() => {
        aiThinking = false;
        const p = state.players[state.currentPlayer];
        if (!p || !p.isAI) return;
        if (state.phase==='draw') {
          drawPiece();
        } else if (state.phase==='discard') {
          discardPiece(p.id, aiChooseDiscard(p.hand).id);
        } else if (state.phase==='can-eat') {
          state.lastDiscard && aiShouldEat(p.hand, state.lastDiscard) ? eatPiece() : skipEat();
        }
      }, delay);
    }

    // ── 遊戲狀態 ──────────────────────────────────────────
    let state = {
      deck:[], players:[], discards:[[],[],[],[]],
      currentPlayer:0, phase:'idle',
      drawnPieceId:null, lastDiscard:null, lastDiscardPlayer:-1
    };
    let revealAll = false;
    let dealerIndex = 0;
    let showOthers = false;
    let confettiLaunched = false;

    function newGame() {
      aiThinking = false;
      confettiLaunched = false;
      const deck = shuffle(createDeck());
      const players = [0,1,2,3].map(i => ({
        id:i, name: i===0?'你':`AI ${i+1}`,
        hand:[], isDealer:i===dealerIndex, isAI:i!==0
      }));
      for (let i=0;i<4;i++) for (const p of players) p.hand.push(deck.pop());

      state = {
        deck, players, discards:[[],[],[],[]],
        currentPlayer:dealerIndex, phase:'draw',
        drawnPieceId:null, lastDiscard:null, lastDiscardPlayer:-1
      };
      dealerIndex = (dealerIndex+1)%4;
      document.getElementById('win-overlay').classList.remove('show');
      clearLog();
      addLog(`遊戲開始！${state.players.find(p=>p.isDealer).name} 為莊家。`);
      setStatus('');
      render();
    }

    function drawPiece() {
      if (state.phase === 'can-eat') {
        state.lastDiscard = null;
        state.lastDiscardPlayer = -1;
        state.phase = 'draw';
      }
      if (state.phase !== 'draw') return;
      if (state.deck.length === 0) {
        addLog('牌堆已空，遊戲平局！');
        state.phase = 'idle';
        render();
        return;
      }
      const piece  = state.deck.pop();
      const player = state.players[state.currentPlayer];
      player.hand.push(piece);
      sortHand(player.hand);
      state.drawnPieceId = piece.id;
      state.phase = 'discard';
      addLog(`${player.name} 摸到「${piece.color==='red'?'紅':'黑'}${pieceChar(piece)}」`);
      const result = checkWin(player.hand);
      if (result.win) {
        addLog(`${player.name} 自摸胡牌！${result.pattern}`);
        state.phase = 'idle';
        render();
        showWin(player, result.pattern, '自摸', -1);
      } else {
        if (!player.isAI) setStatus('請點擊手牌打出一張');
        render();
      }
    }

    function discardPiece(playerId, pieceId) {
      if (state.phase !== 'discard' || state.currentPlayer !== playerId) return;
      const player = state.players[playerId];
      const idx = player.hand.findIndex(p => p.id === pieceId);
      if (idx === -1) return;
      const discarded = player.hand.splice(idx,1)[0];
      state.discards[playerId].push(discarded);
      addLog(`${player.name} 打出「${discarded.color==='red'?'紅':'黑'}${pieceChar(discarded)}」`);
      state.drawnPieceId = null;
      state.lastDiscard = discarded;
      state.lastDiscardPlayer = playerId;

      for (let i=1;i<=3;i++) {
        const ci = (playerId+i)%4;
        const cp = state.players[ci];
        const result = checkWin([...cp.hand, discarded]);
        if (result.win) {
          state.discards[playerId].splice(state.discards[playerId].findIndex(p=>p.id===discarded.id),1);
          addLog(`${cp.name} 放砲胡牌！${result.pattern}`);
          state.phase = 'idle';
          render();
          showWin(cp, result.pattern, '放砲', playerId);
          return;
        }
      }

      state.currentPlayer = (playerId+1)%4;
      state.phase = 'can-eat';
      setStatus('');
      render();
    }

    function eatPiece() {
      if (state.phase !== 'can-eat' || !state.lastDiscard) return;
      const piece     = state.lastDiscard;
      const sourceIdx = state.lastDiscardPlayer;
      const pile      = state.discards[sourceIdx];
      const idx       = pile.findIndex(p => p.id === piece.id);
      if (idx !== -1) pile.splice(idx,1);

      const player = state.players[state.currentPlayer];
      player.hand.push(piece);
      sortHand(player.hand);
      state.drawnPieceId = piece.id;
      state.lastDiscard = null;
      state.lastDiscardPlayer = -1;
      state.phase = 'discard';
      addLog(`${player.name} 吃了「${piece.color==='red'?'紅':'黑'}${pieceChar(piece)}」`);

      const result = checkWin(player.hand);
      if (result.win) {
        addLog(`${player.name} 胡牌！${result.pattern}`);
        state.phase = 'idle';
        render();
        showWin(player, result.pattern, '吃牌胡', sourceIdx);
      } else {
        if (!player.isAI) setStatus('吃牌後請打出一張');
        render();
      }
    }

    function skipEat() {
      if (state.phase !== 'can-eat') return;
      state.lastDiscard = null;
      state.lastDiscardPlayer = -1;
      state.phase = 'draw';
      setStatus('');
      render();
    }

    // ── 渲染 ──────────────────────────────────────────────
    function render() {
      renderMyArea();
      renderOthersArea();

      const cp = state.players[state.currentPlayer];
      let phaseLabel;
      if (state.phase === 'idle') {
        phaseLabel = '遊戲結束';
      } else if (cp && cp.isAI) {
        const action = state.phase==='draw' ? '摸牌中' : state.phase==='discard' ? '出牌中' : '決定是否吃牌';
        phaseLabel = `${cp.name} ${action}...`;
      } else {
        phaseLabel = state.phase==='draw'    ? '輪到你 – 摸牌' :
                     state.phase==='can-eat' ? '輪到你 – 吃牌 或 直接摸牌（跳過）' :
                                               '輪到你 – 請打出一張手牌';
      }
      document.getElementById('turn-info').textContent = phaseLabel;
      document.getElementById('deck-count').innerHTML  = `牌堆剩餘：<span class="num">${state.deck.length}</span> 張`;

      const isHumanTurn = cp && !cp.isAI;
      document.getElementById('draw-btn').disabled =
        !(isHumanTurn && (state.phase === 'draw' || state.phase === 'can-eat'));
      document.getElementById('eat-btn').style.display =
        (state.phase === 'can-eat' && isHumanTurn) ? 'inline-block' : 'none';

      renderDiscards();
      scheduleAITurn();
    }

    function renderMyArea() {
      const myEl   = document.getElementById('my-area');
      myEl.innerHTML = '';
      if (!state.players.length) return;
      const player   = state.players[0];
      const isActive = state.currentPlayer === 0;

      const panel = document.createElement('div');
      panel.className = `player-panel me-panel${isActive ? ' active' : ''}`;

      const nameDiv = document.createElement('div');
      nameDiv.className = 'player-name';
      let nameHTML = player.name;
      if (player.isDealer) nameHTML += ' <span class="dealer-badge">莊</span>';
      nameHTML += ' <span class="me-badge">你</span>';
      nameHTML += ' ' + scoreBadge(0);
      nameHTML += ` <span style="color:#aaa;font-size:.85rem">(${player.hand.length}張)</span>`;
      nameDiv.innerHTML = nameHTML;
      panel.appendChild(nameDiv);

      const handDiv = document.createElement('div');
      handDiv.className = 'hand large';
      const canDiscard = isActive && state.phase === 'discard';
      for (const piece of player.hand) {
        const el  = document.createElement('div');
        const isNew = piece.id === state.drawnPieceId;
        el.className = `piece large ${piece.color}${canDiscard?' selectable':''}${isNew?' drawn':''}`;
        el.textContent = pieceChar(piece);
        el.title = `${piece.color==='red'?'紅':'黑'}${pieceChar(piece)}`;
        if (canDiscard) el.onclick = () => discardPiece(0, piece.id);
        handDiv.appendChild(el);
      }
      panel.appendChild(handDiv);

      if (state.phase==='idle' && player.hand.length>0) {
        const hint = document.createElement('div');
        hint.style.cssText = 'margin-top:8px;font-size:.8rem;color:#aaa';
        hint.textContent = '（結局揭牌）';
        panel.appendChild(hint);
      }
      myEl.appendChild(panel);
    }

    function renderOthersArea() {
      const othersEl = document.getElementById('others-area');
      if (!showOthers) { othersEl.style.display = 'none'; return; }
      othersEl.style.display = 'flex';
      othersEl.innerHTML = '';
      if (!state.players.length) return;

      for (let i=1; i<4; i++) {
        const player   = state.players[i];
        const isActive = state.currentPlayer === i;
        const isThinking = isActive && player.isAI && state.phase !== 'idle';

        const panel = document.createElement('div');
        panel.className = `player-panel compact${isActive?' active':''}`;

        const nameDiv = document.createElement('div');
        nameDiv.className = 'player-name';
        nameDiv.style.fontSize = '.82rem';
        let nameHTML = player.name;
        if (player.isDealer) nameHTML += ' <span class="dealer-badge">莊</span>';
        if (isThinking) {
          nameHTML += ' <span class="thinking-badge">思考<span class="dot-anim"><span></span><span></span><span></span></span></span>';
        } else {
          nameHTML += ' <span class="ai-badge">AI</span>';
        }
        nameHTML += ' ' + scoreBadge(i);
        nameHTML += ` <span style="color:#aaa;font-size:.75rem">(${player.hand.length}張)</span>`;
        nameDiv.innerHTML = nameHTML;
        panel.appendChild(nameDiv);

        const handDiv = document.createElement('div');
        handDiv.className = 'hand';
        const showFace = state.phase==='idle' || revealAll;
        for (const piece of player.hand) {
          const el = document.createElement('div');
          if (showFace) {
            el.className = `piece small ${piece.color}`;
            el.textContent = pieceChar(piece);
          } else {
            el.className = 'piece small hidden';
            el.textContent = '♟';
          }
          handDiv.appendChild(el);
        }
        panel.appendChild(handDiv);
        othersEl.appendChild(panel);
      }
    }

    function renderDiscards() {
      const rows = document.getElementById('discard-rows');
      rows.innerHTML = '';
      const canEatNow = state.phase==='can-eat' && state.currentPlayer===0;

      for (let i=0; i<4; i++) {
        const row = document.createElement('div');
        row.className = 'discard-row';

        const label = document.createElement('span');
        label.className = `discard-label discard-label-${i}`;
        label.textContent = state.players.length ? state.players[i].name : `玩家${i+1}`;
        row.appendChild(label);

        const piecesDiv = document.createElement('div');
        piecesDiv.className = 'discard-pieces';
        const pile = state.discards[i];

        if (!pile.length) {
          const empty = document.createElement('span');
          empty.style.cssText = 'color:#444;font-size:.88rem';
          empty.textContent = '尚無棄牌';
          piecesDiv.appendChild(empty);
        } else {
          pile.forEach((piece, j) => {
            const el = document.createElement('div');
            const isLatest  = j === pile.length-1;
            const isEatable = canEatNow && state.lastDiscard && piece.id===state.lastDiscard.id;
            el.className = `piece small ${piece.color}${isEatable?' eatable':''}${isLatest?' latest':''}`;
            el.textContent = pieceChar(piece);
            el.title = `${piece.color==='red'?'紅':'黑'}${pieceChar(piece)}${isEatable?' （可吃）':''}`;
            piecesDiv.appendChild(el);
          });
        }
        row.appendChild(piecesDiv);
        rows.appendChild(row);
      }
    }

    function showWin(player, pattern, winType, discardOrSourceIdx) {
      const tai = getWinTai(pattern, winType === '自摸');
      const changes = [0, 0, 0, 0];

      if (winType === '自摸') {
        changes[player.id] = tai * 3;
        for (let i = 0; i < 4; i++) if (i !== player.id) changes[i] = -tai;
      } else {
        changes[player.id] = tai;
        if (discardOrSourceIdx >= 0) changes[discardOrSourceIdx] = -tai;
      }
      for (let i = 0; i < 4; i++) scores[i] += changes[i];

      document.getElementById('win-crown').textContent    = player.isAI ? '🤖' : '👑';
      document.getElementById('win-title').textContent    = player.isAI ? 'AI 胡牌！' : '你胡牌了！';
      document.getElementById('win-msg').textContent      = `${player.name} 以「${pattern}」胡牌！`;
      document.getElementById('win-type-badge').textContent = `${winType}｜${tai}台`;

      document.getElementById('win-score-summary').innerHTML =
        state.players.map((p, i) => {
          const ch  = changes[i];
          const cls = ch > 0 ? 'positive' : ch < 0 ? 'negative' : 'neutral';
          return `<div class="score-item ${cls}">
            <span class="score-name">${p.name}</span>
            <span class="score-delta">${ch > 0 ? '+' : ''}${ch}</span>
            <span class="score-total">${scores[i] >= 0 ? '+' : ''}${scores[i]}台</span>
          </div>`;
        }).join('');

      document.getElementById('win-overlay').classList.add('show');
      if (!confettiLaunched) { launchConfetti(); confettiLaunched = true; }
    }

    function launchConfetti() {
      const box = document.querySelector('.win-box');
      box.querySelectorAll('.confetti-piece').forEach(el => el.remove());
      const colors = ['#ffd700','#ff6b6b','#4ade80','#60a5fa','#f472b6','#fb923c','#fff'];
      for (let i=0; i<45; i++) {
        const p = document.createElement('div');
        p.className = 'confetti-piece';
        const size = 4 + Math.random()*7;
        p.style.cssText = `
          left:${Math.random()*100}%;top:0;
          width:${size}px;height:${size}px;
          background:${colors[Math.floor(Math.random()*colors.length)]};
          border-radius:${Math.random()>.5?'50%':'2px'};
          animation-delay:${Math.random()*.9}s;
          animation-duration:${.9+Math.random()*.7}s;
        `;
        box.appendChild(p);
      }
    }

    function toggleOthers() {
      showOthers = !showOthers;
      document.getElementById('toggle-others-btn').textContent =
        showOthers ? '▲ 隱藏 AI 玩家手牌' : '▼ 顯示 AI 玩家手牌';
      renderOthersArea();
    }

    function toggleReveal() {
      revealAll = !revealAll;
      document.getElementById('reveal-btn').textContent = revealAll ? '👁 隱藏AI手牌' : '👁 顯示AI手牌';
      render();
    }

    function setStatus(msg) { document.getElementById('status-msg').textContent = msg; }

    function addLog(msg) {
      const logEl = document.getElementById('log');
      const atBot = logEl.scrollHeight - logEl.scrollTop <= logEl.clientHeight + 2;
      const p = document.createElement('p');
      p.textContent = `[${new Date().toLocaleTimeString('zh-TW')}] ${msg}`;
      logEl.appendChild(p);
      if (atBot) logEl.scrollTop = logEl.scrollHeight;
    }

    function clearLog() { document.getElementById('log').innerHTML = ''; }

    render();
  </script>
</body>
</html>
